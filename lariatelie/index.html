<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Estoque SweetTech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="table-container">
        <div class="container">
            <h1>Estoque Ateliê Jenifer Gama Confeitaria</h1>
            
            <div class="search-group">
                <input type="text" id="busca" placeholder="🔍 Pesquisar produto ou pasta..." oninput="renderizarTabela()">
            </div>

            <div class="form-group">
                <input type="text" id="nome" placeholder="Produto">
                <input type="number" id="qtd" placeholder="Quantidade">
                <input type="text" id="categoria" placeholder="Pasta (Ex: Recheios)">
                <button onclick="adicionarProduto()">Adicionar</button>
            </div>

            <div id="tabelaEstoque">
                </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
